<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NIA Game Admin | Add Game</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="shared.css"/>
  <style>

    .form-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }

    .form-card-header {
      padding: 18px 24px;
      border-bottom: 1px solid var(--border);
      font-family: 'Orbitron', sans-serif;
      font-size: 12px;
      font-weight: 700;
      color: var(--text-muted);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .form-card-body { padding: 24px; }

    /* Styled file input - matches the design system */
    .file-input-wrapper {
      position: relative;
      width: 100%;
    }
    .file-input-wrapper input[type="file"] {
      width: 100%;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      cursor: pointer;
      transition: border-color var(--tr), box-shadow var(--tr);
    }
    .file-input-wrapper input[type="file"]:focus {
      outline: none;
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(240,165,0,.12);
    }
    .file-input-wrapper input[type="file"]::file-selector-button {
      background: var(--bg-card-hover);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 6px 12px;
      margin-right: 14px;
      font-family: 'Rajdhani', sans-serif;
      font-weight: 600;
      font-size: 12px;
      color: var(--text);
      cursor: pointer;
      transition: all var(--tr);
    }
    .file-input-wrapper input[type="file"]::file-selector-button:hover {
      background: var(--gold);
      border-color: var(--gold);
      color: #0a0c12;
    }
    .file-hint {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 6px;
      letter-spacing: 0.3px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .file-hint i {
      font-size: 11px;
      color: var(--cyan);
    }
    .selected-status {
      font-size: 11px;
      color: var(--green);
      margin-top: 6px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .form-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 8px;
    }

    @media (max-width: 960px) {
      .add-game-layout { grid-template-columns: 1fr; }
    }

    /* Success banner */
    .success-banner {
      display: none;
      align-items: center;
      gap: 14px;
      background: rgba(0,230,118,.07);
      border: 1px solid rgba(0,230,118,.2);
      border-radius: var(--radius);
      padding: 16px 20px;
      margin-bottom: 24px;
    }
    .success-banner.visible { display: flex; }
    .success-banner i { color: var(--green); font-size: 20px; flex-shrink: 0; }
    .success-banner-text { font-size: 14px; font-weight: 600; }
    .success-banner-text span { color: var(--green); }
  </style>
</head>
<body>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-badge">N</div>
      <div class="sidebar-title">NIA GAME <span>Admin Office</span></div>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav"></nav>
    <div class="sidebar-footer">
      <button class="logout-btn" onclick="doLogout()">
        <i class="fas fa-sign-out-alt"></i>
        <span class="logout-label">Sign Out</span>
      </button>
    </div>
  </aside>

  <header class="header" id="header">
    <div class="header-left">
      <div class="menu-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></div>
      <div class="breadcrumb">
        <i class="fas fa-home" style="font-size:12px;"></i>
        <span id="breadcrumb-text">Add Game</span>
      </div>
    </div>
    <div class="header-right">
      <div class="notif-btn">
        <i class="fas fa-bell"></i>
        <div class="notif-dot"></div>
      </div>
      <div class="user-pill">
        <div class="user-avatar" id="header-avatar"></div>
        <div class="user-info">
          <div class="uname" id="header-name"></div>
          <div class="urole" id="header-role"></div>
        </div>
        <div class="role-badge" id="header-badge"></div>
      </div>
    </div>
  </header>

  <main class="main" id="main">

    <div class="page-header">
      <div class="page-title">
        Add Game
        <span>Fill in the game details and upload the game HTML file</span>
      </div>
    </div>

    <!-- Success banner, shown after a game is submitted -->
    <div class="success-banner" id="success-banner">
      <i class="fas fa-check-circle"></i>
      <div class="success-banner-text">
        Game <span id="success-game-name"></span> was added successfully and is pending approval.
      </div>
    </div>

    <div class="add-game-layout">

      <!-- LEFT: Game details form -->
      <div>

        <!-- Section 1: Game metadata -->
        <div class="form-card" style="margin-bottom:20px;">
          <div class="form-card-header">
            <i class="fas fa-info-circle" style="margin-right:8px;"></i>Game Details
          </div>
          <div class="form-card-body">

            <div class="form-group">
              <label>Game Title</label>
              <div class="input-wrap">
                <input class="form-control" id="game-title" placeholder="e.g. Binary Search Basics"/>
                <i class="fas fa-gamepad"></i>
              </div>
            </div>

            <div class="form-group">
              <label>Subject</label>
              <select class="form-control no-icon" id="game-subject">
                <option value="">— Select subject —</option>
                <option value="Algorithms">Algorithms</option>
                <option value="Data Structures">Data Structures</option>
                <option value="Operating Systems">Operating Systems</option>
                <option value="Networking">Networking</option>
                <option value="Databases">Databases</option>
              </select>
            </div>

            <div class="form-group">
              <label>Difficulty Level</label>
              <select class="form-control no-icon" id="game-level">
                <option value="">— Select level —</option>
                <option value="Basic">Basic</option>
                <option value="Intermediate">Intermediate</option>
                <option value="Advanced">Advanced</option>
                <option value="Expert">Expert</option>
                <option value="Master">Master</option>
              </select>
            </div>

            <div class="form-group">
              <label>HTML File Name</label>
              <div class="input-wrap">
                <input class="form-control" id="game-filename" placeholder="e.g. binary-search-basics.html"/>
                <i class="fas fa-file-code"></i>
              </div>
            </div>

            <div class="form-group" style="margin-bottom:0;">
              <label>Description</label>
              <div class="input-wrap">
                <textarea class="form-control no-icon" id="game-description" rows="3"
                          placeholder="Brief description of what the game covers..."></textarea>
              </div>
            </div>

          </div>
        </div>

        <!-- Section 2: Game HTML file picker (replaces the text editor) -->
        <div class="form-card">
          <div class="form-card-header">
            <i class="fas fa-file-upload" style="margin-right:8px;"></i>Game HTML File
          </div>
          <div class="form-card-body">

            <div class="form-group" style="margin-bottom:8px;">
              <label>Upload HTML file</label>
              <div class="file-input-wrapper">
                <input type="file" id="game-html-file" accept=".html,.htm" />
              </div>
              <div class="file-hint">
                <i class="fas fa-info-circle"></i> Select a valid .html or .htm file containing your game.
              </div>
              <div id="file-selected-status" class="selected-status" style="display: none;">
                <i class="fas fa-check-circle"></i> <span id="selected-file-name"></span> loaded
              </div>
            </div>

            <!-- Hidden field to store the actual HTML content (replaces the editor textarea) -->
            <input type="hidden" id="game-html-content-hidden" value="" />

            <div class="form-actions">
              <button class="btn btn-outline" onclick="clearForm()">
                <i class="fas fa-times"></i> Clear
              </button>
              <button class="btn btn-primary" onclick="submitGame()">
                <i class="fas fa-paper-plane"></i> Submit Game
              </button>
            </div>

          </div>
        </div>

      </div><!-- end left column -->

    </div><!-- end .add-game-layout -->

  </main>

  <script src="shared.js"></script>
  <script>

    const session = requireAuth();
    buildSidebar('add-game', session.role);
    buildHeader('Add Game', session);

    // DOM references
    const fileInput = document.getElementById('game-html-file');
    const hiddenHtmlContent = document.getElementById('game-html-content-hidden');
    const filenameField = document.getElementById('game-filename');
    const fileStatusDiv = document.getElementById('file-selected-status');
    const selectedFileNameSpan = document.getElementById('selected-file-name');

    // ---------- File picker handler: read content and store in hidden field ----------
    function handleFileSelection(event) {
      const file = event.target.files[0];
      if (!file) {
        // No file selected: clear hidden content and status
        hiddenHtmlContent.value = '';
        fileStatusDiv.style.display = 'none';
        selectedFileNameSpan.textContent = '';
        return;
      }

      // Validate file extension (basic check)
      const fileName = file.name;
      if (!fileName.toLowerCase().endsWith('.html') && !fileName.toLowerCase().endsWith('.htm')) {
        alert('Please select a valid HTML file (.html or .htm).');
        fileInput.value = '';  // reset input
        hiddenHtmlContent.value = '';
        fileStatusDiv.style.display = 'none';
        return;
      }

      // Auto-populate the "HTML File Name" field with the chosen file name (without overwriting if user already set)
      // This is a helpful convenience and doesn't add extra UI elements.
      if (filenameField && !filenameField.value.trim()) {
        filenameField.value = fileName;
      } else if (filenameField && filenameField.value.trim() === '') {
        filenameField.value = fileName;
      }

      // Read file content as text
      const reader = new FileReader();
      reader.onload = function(e) {
        const fileContent = e.target.result;
        hiddenHtmlContent.value = fileContent;
        // Show success status
        selectedFileNameSpan.textContent = fileName;
        fileStatusDiv.style.display = 'flex';
      };
      reader.onerror = function() {
        alert('Error reading file. Please try again.');
        fileInput.value = '';
        hiddenHtmlContent.value = '';
        fileStatusDiv.style.display = 'none';
      };
      reader.readAsText(file, 'UTF-8');
    }

    // Attach file picker event
    if (fileInput) {
      fileInput.addEventListener('change', handleFileSelection);
    }

    // ---------- Validation: ensure all fields including HTML content are provided ----------
    function findFirstInvalidField() {
      if (!document.getElementById('game-title').value.trim())       return 'Game Title';
      if (!document.getElementById('game-subject').value)            return 'Subject';
      if (!document.getElementById('game-level').value)              return 'Difficulty Level';
      if (!document.getElementById('game-filename').value.trim())    return 'HTML File Name';
      const htmlContent = document.getElementById('game-html-content-hidden').value.trim();
      if (!htmlContent) return 'Game HTML File (please select a valid .html file)';
      return null;
    }

    // ---------- Submit game: build entry using hidden HTML content ----------
    function submitGame() {
      const invalidField = findFirstInvalidField();
      if (invalidField) {
        alert(`Please fill in the "${invalidField}" field before submitting.`);
        return;
      }

      const gameTitle    = document.getElementById('game-title').value.trim();
      const gameSubject  = document.getElementById('game-subject').value;
      const gameLevel    = document.getElementById('game-level').value;
      const gameFilename = document.getElementById('game-filename').value.trim();
      const gameDesc     = document.getElementById('game-description').value.trim();
      const gameHtml     = document.getElementById('game-html-content-hidden').value.trim();

      /* Build a new game entry matching the shape used in MOCK.games.pending */
      const newGame = {
        id:        MOCK.games.pending.length + MOCK.games.approved.length + MOCK.games.rejected.length + 1,
        name:      gameTitle,
        file:      gameFilename,
        subject:   gameSubject,
        level:     gameLevel,
        author:    session.name || 'Admin',
        submitted: new Date().toISOString().split('T')[0],
        desc:      gameDesc,
        htmlContent: gameHtml,
      };

      /* Add the game to the pending list in the shared MOCK store */
      MOCK.games.pending.push(newGame);

      /* Show the success banner and scroll to it */
      document.getElementById('success-game-name').textContent = gameTitle;
      const successBanner = document.getElementById('success-banner');
      successBanner.classList.add('visible');
      successBanner.scrollIntoView({ behavior: 'smooth', block: 'center' });

      clearForm();
    }

    // ---------- Clear all form fields, reset file picker and hidden content ----------
    function clearForm() {
      document.getElementById('game-title').value        = '';
      document.getElementById('game-subject').value      = '';
      document.getElementById('game-level').value        = '';
      document.getElementById('game-filename').value     = '';
      document.getElementById('game-description').value  = '';
      // Clear hidden HTML content
      if (hiddenHtmlContent) hiddenHtmlContent.value = '';
      // Reset file input
      if (fileInput) {
        fileInput.value = '';
      }
      // Hide file status indicator
      if (fileStatusDiv) {
        fileStatusDiv.style.display = 'none';
        if (selectedFileNameSpan) selectedFileNameSpan.textContent = '';
      }
    }

  </script>
</body>
</html>
