<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NIA Game | Admin Login</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
<link rel="stylesheet" href="shared.css"/>
<style>
/* ── Login page specific styles ── */
body {
  display:flex; align-items:center; justify-content:center;
  min-height:100vh;
  background:
    radial-gradient(ellipse 60% 40% at 20% 20%, rgba(240,165,0,.07) 0%, transparent 60%),
    radial-gradient(ellipse 50% 40% at 80% 80%, rgba(0,212,255,.07) 0%, transparent 60%),
    var(--bg-root);
  position:relative; overflow:hidden;
}

.login-grid {
  position:absolute; inset:0;
  background-image:
    linear-gradient(rgba(240,165,0,.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(240,165,0,.04) 1px, transparent 1px);
  background-size:60px 60px;
  animation:gridScroll 20s linear infinite;
  z-index:0;
}
@keyframes gridScroll {
  from { transform:translateY(0); }
  to   { transform:translateY(60px); }
}

.login-box {
  position:relative; z-index:1;
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:var(--radius-lg);
  padding:48px 44px 40px;
  width:min(480px, 94vw);
  box-shadow:var(--shadow), 0 0 60px rgba(240,165,0,.06);
  animation:boxIn .5s ease both;
}
@keyframes boxIn {
  from { opacity:0; transform:translateY(30px); }
  to   { opacity:1; transform:none; }
}

.login-logo {
  display:flex; align-items:center; gap:12px;
  margin-bottom:32px; justify-content:center;
}
.login-logo .lbadge {
  width:52px; height:52px; border-radius:14px;
  background:linear-gradient(135deg, var(--gold), #e08500);
  display:flex; align-items:center; justify-content:center;
  font-family:'Orbitron',sans-serif; font-weight:900; font-size:20px; color:#000;
  box-shadow:var(--glow-gold);
}
.login-logo-text { font-family:'Orbitron',sans-serif; }
.login-logo-text .n1 { font-size:22px; font-weight:700; color:var(--gold); }
.login-logo-text .n2 { font-size:11px; color:var(--text-muted); letter-spacing:3px; text-transform:uppercase; }

.login-title { text-align:center; margin-bottom:8px; font-family:'Orbitron',sans-serif; font-size:18px; font-weight:700; }
.login-sub   { text-align:center; color:var(--text-muted); font-size:14px; margin-bottom:36px; }

.role-select { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:28px; }
.role-chip {
  padding:10px 8px; border:1px solid var(--border); border-radius:8px;
  background:var(--bg-input); text-align:center; cursor:pointer;
  font-family:'Rajdhani',sans-serif; font-size:13px; font-weight:600;
  color:var(--text-muted); transition:all var(--tr); letter-spacing:.3px;
}
.role-chip:hover  { border-color:rgba(240,165,0,.4); color:var(--text); }
.role-chip.active { border-color:var(--gold); color:var(--gold); background:rgba(240,165,0,.08); }
.role-chip i { display:block; font-size:16px; margin-bottom:4px; }

.btn-login {
  width:100%; padding:14px;
  background:linear-gradient(135deg, var(--gold), #cc8800);
  border:none; border-radius:var(--radius);
  color:#000; font-family:'Orbitron',sans-serif; font-size:13px; font-weight:700;
  letter-spacing:1px; cursor:pointer;
  box-shadow:var(--glow-gold);
  transition:all var(--tr);
}
.btn-login:hover { transform:translateY(-2px); box-shadow:0 8px 32px rgba(240,165,0,.45); }

.login-note { text-align:center; margin-top:20px; font-size:12px; color:var(--text-dim); }

.login-error {
  background:rgba(255,77,77,.12); border:1px solid rgba(255,77,77,.3);
  border-radius:8px; padding:10px 14px; margin-bottom:16px;
  color:var(--red); font-size:13px; display:none;
  align-items:center; gap:8px;
}

.divider {
  display:flex; align-items:center; gap:12px;
  margin-bottom:20px; color:var(--text-dim); font-size:12px;
}
.divider::before, .divider::after {
  content:''; flex:1; height:1px; background:var(--border);
}
</style>
</head>
<body>
<div class="login-grid"></div>

<div class="login-box">
  <!-- Logo -->
  <div class="login-logo">
    <div class="lbadge">N</div>
    <div class="login-logo-text">
      <div class="n1">NIA GAME</div>
      <div class="n2">Back Office</div>
    </div>
  </div>

  <div class="login-title">Administrator Portal</div>
  <div class="login-sub">Sign in to manage the NIA Game platform</div>

  <!-- Error message -->
  <div class="login-error" id="login-error">
    <i class="fas fa-exclamation-circle"></i>
    <span id="login-error-msg">Invalid credentials. Please try again.</span>
  </div>

  <!-- Demo role selector — commented out; system determines role automatically
  <div class="divider">Select Role (Demo)</div>
  <div class="role-select" id="role-selector">
    <div class="role-chip active" data-role="superadmin" onclick="selectRole('superadmin', this)">
      <i class="fas fa-crown"></i>Super Admin
    </div>
    <div class="role-chip" data-role="admin" onclick="selectRole('admin', this)">
      <i class="fas fa-user-shield"></i>Admin
    </div>
    <div class="role-chip" data-role="staff" onclick="selectRole('staff', this)">
      <i class="fas fa-user-check"></i>Staff
    </div>
  </div>
  -->

  <!-- Form -->
  <div class="form-group">
    <label>Email Address</label>
    <div class="input-wrap">
      <input class="form-control" type="email" id="login-email" placeholder="admin@niagame.com" value="superadmin@niagame.com"/>
      <i class="fas fa-envelope"></i>
    </div>
  </div>
  <div class="form-group">
    <label>Password</label>
    <div class="input-wrap">
      <input class="form-control" type="password" id="login-pass" placeholder="••••••••" value="admin123"/>
      <i class="fas fa-lock"></i>
    </div>
  </div>

  <button class="btn-login" onclick="doLogin()">
    <i class="fas fa-sign-in-alt" style="margin-right:8px;"></i>
    SIGN IN TO DASHBOARD
  </button>

  <div class="login-note">
    Accounts are managed by the Super Administrator.<br/>
    Contact your administrator if you cannot sign in.
  </div>
</div>

<script src="shared.js"></script>
<script>
/* ── Page JS ── */
let selectedRole = 'superadmin';

// Redirect to dashboard if already logged in
(function() {
  const s = getSession();
  if (s) window.location.href = 'dashboard.html';
})();

function selectRole(role, el) {
  selectedRole = role;
  document.querySelectorAll('.role-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  // Auto-fill demo email
  const emails = {
    superadmin: 'superadmin@niagame.com',
    admin:      'admin@niagame.com',
    staff:      'staff@niagame.com',
  };
  document.getElementById('login-email').value = emails[role];
}

function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-pass').value.trim();
  const err   = document.getElementById('login-error');

  if (!email || !pass) {
    err.style.display = 'flex';
    document.getElementById('login-error-msg').textContent = 'Please fill in all fields.';
    return;
  }
  if (pass.length < 6) {
    err.style.display = 'flex';
    document.getElementById('login-error-msg').textContent = 'Password is too short.';
    return;
  }

  err.style.display = 'none';

  // In production, replace below with a real API call:
  // const res = await fetch('/api/auth/login', { method:'POST', body: JSON.stringify({email, pass}) });
  const names = { superadmin:'Dr. Amina Salim', admin:'Mr. Peter Njomo', staff:'Mr. Kevin Dube' };
  setSession(selectedRole, names[selectedRole], email);
  window.location.href = 'dashboard.html';
}

// Allow Enter key to submit
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});
</script>
</body>
</html>
