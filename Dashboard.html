<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NIA Game Admin | Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
<link rel="stylesheet" href="shared.css"/>
<style>
/* ── Dashboard page specific styles ── */
.donut-wrap { display:flex; align-items:center; gap:24px; flex-wrap:wrap; }
.donut-legend { display:flex; flex-direction:column; gap:10px; }
.legend-item  { display:flex; align-items:center; gap:8px; font-size:13px; font-weight:500; }
.legend-dot   { width:10px; height:10px; border-radius:3px; flex-shrink:0; }

.pending-row {
  display:flex; align-items:center; justify-content:space-between;
  padding:12px 0; border-bottom:1px solid var(--border);
}
.pending-row:last-child { border-bottom:none; }
.pending-row .pr-info .pr-name  { font-size:13px; font-weight:600; }
.pending-row .pr-info .pr-meta  { font-size:11px; color:var(--text-muted); margin-top:2px; }
</style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <div class="sidebar-badge">N</div>
    <div class="sidebar-title">NIA GAME <span>Admin Office</span></div>
  </div>
  <nav class="sidebar-nav" id="sidebar-nav"></nav>
  <div class="sidebar-footer">
    <button class="logout-btn" onclick="doLogout()">
      <i class="fas fa-sign-out-alt"></i>
      <span class="logout-label">Sign Out</span>
    </button>
  </div>
</aside>

<!-- HEADER -->
<header class="header" id="header">
  <div class="header-left">
    <div class="menu-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></div>
    <div class="breadcrumb">
      <i class="fas fa-home" style="font-size:12px;"></i>
      <span id="breadcrumb-text">Dashboard</span>
    </div>
  </div>
  <div class="header-right">
    <div class="notif-btn">
      <i class="fas fa-bell"></i>
      <div class="notif-dot"></div>
    </div>
    <div class="user-pill">
      <div class="user-avatar" id="header-avatar"></div>
      <div class="user-info">
        <div class="uname" id="header-name"></div>
        <div class="urole" id="header-role"></div>
      </div>
      <div class="role-badge" id="header-badge"></div>
    </div>
  </div>
</header>

<!-- MAIN -->
<main class="main" id="main">

  <div class="page-header">
    <div class="page-title">
      Game Dashboard
      <span>Overview of all platform activity and key metrics</span>
    </div>
    <div class="page-actions">
      <a href="reports.html" class="btn btn-outline"><i class="fas fa-chart-bar"></i> Reports</a>
      <button class="btn btn-primary" onclick="window.print()"><i class="fas fa-download"></i> Export</button>
    </div>
  </div>

  <!-- Stat Cards -->
  <div class="stat-grid" id="stat-grid"></div>

  <!-- Charts Row -->
  <div class="grid-2" style="margin-bottom:20px;">
    <div class="card">
      <div class="card-header">
        <div class="card-title">
          <i class="fas fa-chart-line" style="color:var(--gold);margin-right:8px;"></i>
          Games Played vs Topics
        </div>
        <button class="btn btn-outline btn-sm">Last 7 Days</button>
      </div>
      <div class="card-body">
        <div class="bar-chart" id="bar-games-topics"></div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <div class="card-title">
          <i class="fas fa-layer-group" style="color:var(--cyan);margin-right:8px;"></i>
          Users by Expertise Level
        </div>
      </div>
      <div class="card-body">
        <div class="donut-wrap">
          <svg width="140" height="140" viewBox="0 0 140 140">
            <circle cx="70" cy="70" r="52" fill="none" stroke="rgba(255,255,255,.05)" stroke-width="18"/>
            <circle cx="70" cy="70" r="52" fill="none" stroke="#f0a500" stroke-width="18" stroke-dasharray="98 229"  stroke-dashoffset="0"    stroke-linecap="round"/>
            <circle cx="70" cy="70" r="52" fill="none" stroke="#00d4ff" stroke-width="18" stroke-dasharray="70 229"  stroke-dashoffset="-98"  stroke-linecap="round"/>
            <circle cx="70" cy="70" r="52" fill="none" stroke="#00e676" stroke-width="18" stroke-dasharray="42 229"  stroke-dashoffset="-168" stroke-linecap="round"/>
            <circle cx="70" cy="70" r="52" fill="none" stroke="#a855f7" stroke-width="18" stroke-dasharray="19 229"  stroke-dashoffset="-210" stroke-linecap="round"/>
            <text x="70" y="67" text-anchor="middle" fill="#e8ecf0" font-family="Orbitron" font-size="18" font-weight="700">842</text>
            <text x="70" y="82" text-anchor="middle" fill="#7a8499" font-size="10">users</text>
          </svg>
          <div class="donut-legend">
            <div class="legend-item"><div class="legend-dot" style="background:var(--gold);"></div>Basic — 43%</div>
            <div class="legend-item"><div class="legend-dot" style="background:var(--cyan);"></div>Intermediate — 31%</div>
            <div class="legend-item"><div class="legend-dot" style="background:var(--green);"></div>Advanced — 18%</div>
            <div class="legend-item"><div class="legend-dot" style="background:var(--purple);"></div>Expert &amp; Master — 8%</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Bottom Row -->
  <div class="grid-2">
    <div class="card">
      <div class="card-header">
        <div class="card-title">
          <i class="fas fa-bolt" style="color:var(--orange);margin-right:8px;"></i>
          Recent Activity
        </div>
        <span style="font-size:12px;color:var(--text-muted);">Live feed</span>
      </div>
      <div class="activity-list" id="activity-feed"></div>
    </div>

    <div class="card">
      <div class="card-header">
        <div class="card-title">
          <i class="fas fa-hourglass-half" style="color:var(--orange);margin-right:8px;"></i>
          Pending Approvals
        </div>
        <a href="games.html" class="btn btn-cyan btn-sm">View All</a>
      </div>
      <div class="card-body" id="pending-list"></div>
    </div>
  </div>

</main>

<script src="shared.js"></script>
<script>
/* ── Dashboard JS ── */
const session = requireAuth();

// Build layout
buildSidebar('dashboard', session.role);
buildHeader('Dashboard', session);

// ── Stat Cards ──
const stats = [
  { val:'842',   label:'Total Users',    icon:'fa-users',          cls:'gold',   ic:'ic-gold',   ch:'+12', up:true  },
  { val:'1,248', label:'Games Played',   icon:'fa-gamepad',        cls:'cyan',   ic:'ic-cyan',   ch:'+87', up:true  },
  { val:'2',     label:'Domains',        icon:'fa-globe',          cls:'green',  ic:'ic-green',  ch:'0',   up:true  },
  { val:'12',    label:'Subjects',       icon:'fa-layer-group',    cls:'purple', ic:'ic-purple', ch:'0',   up:true  },
  { val:'38',    label:'Total Topics',   icon:'fa-book-open',      cls:'cyan',   ic:'ic-cyan',   ch:'+2',  up:true  },
  { val:'5',     label:'Pending Games',  icon:'fa-hourglass-half', cls:'orange', ic:'ic-orange', ch:'+3',  up:false },
  { val:'3',     label:'Pending Users',  icon:'fa-user-clock',     cls:'red',    ic:'ic-red',    ch:'+1',  up:false },
];
document.getElementById('stat-grid').innerHTML = stats.map(s => `
  <div class="stat-card ${s.cls}">
    <div class="stat-icon ${s.ic}"><i class="fas ${s.icon}"></i></div>
    <div class="stat-val">${s.val}</div>
    <div class="stat-label">${s.label}</div>
    <div class="stat-change ${s.up ? 'stat-up' : 'stat-down'}">
      <i class="fas fa-arrow-${s.up ? 'up' : 'down'}"></i>${s.ch} this week
    </div>
  </div>`).join('');

// ── Bar Chart ──
const topics = [
  { label:'Data Struct', played:423, color:'var(--gold)'   },
  { label:'Algorithms',  played:310, color:'var(--cyan)'   },
  { label:'Sorting',     played:215, color:'var(--green)'  },
  { label:'Graph Theory',played:178, color:'var(--purple)' },
  { label:'Dynamic Prog',played:122, color:'var(--orange)' },
];
const max = Math.max(...topics.map(t => t.played));
document.getElementById('bar-games-topics').innerHTML = topics.map(t => `
  <div class="bar-row">
    <div class="bar-label">${t.label}</div>
    <div class="bar-track"><div class="bar-fill" style="width:${t.played/max*100}%;background:${t.color};"></div></div>
    <div class="bar-val">${t.played}</div>
  </div>`).join('');

// ── Activity Feed ──
document.getElementById('activity-feed').innerHTML = MOCK.activities.map(a => `
  <div class="activity-item">
    <div class="activity-icon" style="background:${a.bg};color:${a.color};">
      <i class="fas ${a.icon}"></i>
    </div>
    <div class="activity-body">
      <div class="activity-msg">${a.msg}</div>
      <div class="activity-time"><i class="fas fa-clock" style="margin-right:4px;"></i>${a.time}</div>
    </div>
  </div>`).join('');

// ── Pending Approvals ──
document.getElementById('pending-list').innerHTML = MOCK.games.pending.slice(0,3).map(g => `
  <div class="pending-row">
    <div class="pr-info">
      <div class="pr-name">${g.name}</div>
      <div class="pr-meta">by ${g.author} · ${g.level} · ${g.subject}</div>
    </div>
    <div class="action-row">
      ${!can(session,'approve') ? '' : `
        <button class="btn btn-success btn-sm btn-icon" title="Approve"><i class="fas fa-check"></i></button>
        <button class="btn btn-danger btn-sm btn-icon" title="Reject"><i class="fas fa-times"></i></button>
      `}
      <a href="games.html" class="btn btn-outline btn-sm btn-icon" title="View All">
        <i class="fas fa-eye"></i>
      </a>
    </div>
  </div>`).join('');
</script>
</body>
</html>
