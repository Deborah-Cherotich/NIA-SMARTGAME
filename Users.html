<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NIA Game Admin | User Management</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
<link rel="stylesheet" href="shared.css"/>
<style>
.level-badge { font-size:12px; font-weight:700; padding:2px 8px; border-radius:4px; }
.score-cell  { display:flex; align-items:center; gap:8px; }
.score-mini  { flex:1; min-width:50px; }

/* Purple tint for the chart icon button */
.btn-chart { border-color:rgba(168,85,247,.35); color:var(--purple); }
.btn-chart:hover {
  background:rgba(168,85,247,.12);
  border-color:var(--purple);
  box-shadow:0 0 10px rgba(168,85,247,.25);
}
</style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <div class="sidebar-badge">N</div>
    <div class="sidebar-title">NIA GAME <span>Admin Office</span></div>
  </div>
  <nav class="sidebar-nav" id="sidebar-nav"></nav>
  <div class="sidebar-footer">
    <button class="logout-btn" onclick="doLogout()">
      <i class="fas fa-sign-out-alt"></i>
      <span class="logout-label">Sign Out</span>
    </button>
  </div>
</aside>

<!-- HEADER -->
<header class="header" id="header">
  <div class="header-left">
    <div class="menu-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></div>
    <div class="breadcrumb">
      <i class="fas fa-home" style="font-size:12px;"></i>
      <span id="breadcrumb-text">User Management</span>
    </div>
  </div>
  <div class="header-right">
    <div class="notif-btn">
      <i class="fas fa-bell"></i>
      <div class="notif-dot"></div>
    </div>
    <div class="user-pill">
      <div class="user-avatar" id="header-avatar"></div>
      <div class="user-info">
        <div class="uname" id="header-name"></div>
        <div class="urole" id="header-role"></div>
      </div>
      <div class="role-badge" id="header-badge"></div>
    </div>
  </div>
</header>

<!-- MAIN -->
<main class="main" id="main">

  <div class="page-header">
    <div class="page-title">
      User Management
      <span>View, approve, delete and manage learner accounts</span>
    </div>
    <div class="page-actions" id="page-actions"></div>
  </div>

  <div id="perm-notice"></div>

  <div class="card">
    <div class="filter-bar">
      <div class="search-wrap">
        <i class="fas fa-search"></i>
        <input class="search-input" type="text" id="search-input"
               placeholder="Search users by name or email..." oninput="filterTable()"/>
      </div>
      <select class="filter-select" id="filter-status" onchange="filterTable()">
        <option value="">All Status</option>
        <option value="active">Active</option>
        <option value="pending">Pending</option>
        <option value="blocked">Blocked</option>
      </select>
      <select class="filter-select" id="filter-level" onchange="filterTable()">
        <option value="">All Levels</option>
        <option value="Basic">Basic</option>
        <option value="Intermediate">Intermediate</option>
        <option value="Advanced">Advanced</option>
        <option value="Expert">Expert</option>
        <option value="Master">Master</option>
      </select>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>User</th>
            <th>Email</th>
            <th>Level</th>
            <th>Games Played</th>
            <th>Avg Score</th>
            <th>Status</th>
            <th>Registered</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="users-tbody"></tbody>
      </table>
    </div>

    <div style="padding:14px 22px;border-top:1px solid var(--border);font-size:13px;color:var(--text-muted);display:flex;justify-content:space-between;align-items:center;">
      <span id="row-count">Showing 8 of 8 users</span>
      <div style="display:flex;gap:6px;">
        <button class="btn btn-outline btn-sm">← Prev</button>
        <button class="btn btn-outline btn-sm">Next →</button>
      </div>
    </div>
  </div>

</main>

<!-- MODAL: Add / Edit User -->
<div class="modal-overlay" id="modal-user">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-user-title">Add New User</div>
      <button class="modal-close" onclick="closeModal('modal-user')"><i class="fas fa-times"></i></button>
    </div>
    <div class="form-group">
      <label>Full Name</label>
      <div class="input-wrap">
        <input class="form-control" id="u-name" placeholder="e.g. Jane Doe"/>
        <i class="fas fa-user"></i>
      </div>
    </div>
    <div class="form-group">
      <label>Email Address</label>
      <div class="input-wrap">
        <input class="form-control" type="email" id="u-email" placeholder="jane@example.com"/>
        <i class="fas fa-envelope"></i>
      </div>
    </div>
    <div class="form-group">
      <label>Status</label>
      <select class="form-control no-icon" id="u-status">
        <option>Active</option><option>Pending</option><option>Blocked</option>
      </select>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('modal-user')">Cancel</button>
      <button class="btn btn-primary" onclick="saveUser()"><i class="fas fa-save"></i> Save Changes</button>
    </div>
  </div>
</div>

<script src="shared.js"></script>
<script>
const session = requireAuth();
buildSidebar('users', session.role);
buildHeader('User Management', session);

if (can(session, 'create')) {
  document.getElementById('page-actions').innerHTML = `
    <button class="btn btn-outline" onclick="window.print()"><i class="fas fa-print"></i> Print</button>
    <button class="btn btn-primary" onclick="openAddUser()"><i class="fas fa-user-plus"></i> Add User</button>`;
}

if (!can(session, 'edit')) {
  showPermNotice('perm-notice', 'You have <strong>view-only</strong> access to user data. Contact an Admin to make changes.');
}

const levelColour = {
  Basic: 'var(--green)', Intermediate: 'var(--cyan)',
  Advanced: 'var(--orange)', Expert: 'var(--gold)', Master: 'var(--purple)'
};

let filteredUsers = [...MOCK.users];

function renderTable(users) {
  document.getElementById('row-count').textContent = `Showing ${users.length} of ${MOCK.users.length} users`;
  document.getElementById('users-tbody').innerHTML = users.map(u => `
    <tr>
      <td>
        <div class="user-mini">
          <div class="ava" style="background:${levelColour[u.level]}22;color:${levelColour[u.level]};">
            ${u.name.split(' ').map(n => n[0]).join('')}
          </div>
          <span>${u.name}</span>
        </div>
      </td>
      <td style="color:var(--text-muted);">${u.email}</td>
      <td>
        <span class="level-badge" style="background:${levelColour[u.level]}18;color:${levelColour[u.level]};">
          ${u.level}
        </span>
      </td>
      <td>${u.games}</td>
      <td>
        <div class="score-cell">
          <span>${u.score}%</span>
          <div class="score-mini">
            <div class="progress-track">
              <div class="progress-fill" style="width:${u.score}%;background:${u.score >= 85 ? 'var(--green)' : u.score >= 60 ? 'var(--gold)' : 'var(--red)'};"></div>
            </div>
          </div>
        </div>
      </td>
      <td>
        <span class="status-pill status-${u.status}">
          <span class="status-dot"></span>${u.status}
        </span>
      </td>
      <td style="color:var(--text-muted);font-size:12px;">${u.reg}</td>
      <td>
        <div class="action-row">
          <button class="btn btn-outline btn-sm btn-icon" title="View Details"
                  onclick="window.location.href='view-user.html?id=${u.id}'">
            <i class="fas fa-eye"></i>
          </button>
          <button class="btn btn-outline btn-sm btn-icon btn-chart" title="View Activity Graph"
                  onclick="window.location.href='user-graph.html?id=${u.id}'">
            <i class="fas fa-chart-line"></i>
          </button>
          ${can(session, 'edit') ? `
            ${u.status === 'pending' ? `
              <button class="btn btn-success btn-sm btn-icon" title="Approve" onclick="approveUser(${u.id})">
                <i class="fas fa-check"></i>
              </button>` : ''}
            <button class="btn btn-cyan btn-sm btn-icon" title="Edit" onclick="openEditUser(${u.id})">
              <i class="fas fa-edit"></i>
            </button>
          ` : ''}
          ${can(session, 'delete') ? `
            <button class="btn btn-danger btn-sm btn-icon" title="Delete" onclick="deleteUser(${u.id})">
              <i class="fas fa-trash"></i>
            </button>
          ` : ''}
        </div>
      </td>
    </tr>`).join('');
}

function filterTable() {
  const query       = document.getElementById('search-input').value.toLowerCase();
  const statusValue = document.getElementById('filter-status').value;
  const levelValue  = document.getElementById('filter-level').value;

  filteredUsers = MOCK.users.filter(u =>
    (!query       || u.name.toLowerCase().includes(query) || u.email.toLowerCase().includes(query)) &&
    (!statusValue || u.status === statusValue) &&
    (!levelValue  || u.level  === levelValue)
  );
  renderTable(filteredUsers);
}

function approveUser(id) {
  const user = MOCK.users.find(u => u.id === id);
  if (user) { user.status = 'active'; filterTable(); }
}

function deleteUser(id) {
  if (confirm('Are you sure you want to delete this user?')) {
    const index = MOCK.users.findIndex(u => u.id === id);
    if (index > -1) { MOCK.users.splice(index, 1); filterTable(); }
  }
}

let editingUserId = null;

function openAddUser() {
  editingUserId = null;
  document.getElementById('modal-user-title').textContent = 'Add New User';
  document.getElementById('u-name').value  = '';
  document.getElementById('u-email').value = '';
  openModal('modal-user');
}

function openEditUser(id) {
  const user = MOCK.users.find(u => u.id === id);
  editingUserId = id;
  document.getElementById('modal-user-title').textContent = 'Edit User';
  document.getElementById('u-name').value   = user.name;
  document.getElementById('u-email').value  = user.email;
  document.getElementById('u-status').value = user.status.charAt(0).toUpperCase() + user.status.slice(1);
  openModal('modal-user');
}

function saveUser() {
  closeModal('modal-user');
  filterTable();
}

renderTable(MOCK.users);
</script>
</body>
</html>
